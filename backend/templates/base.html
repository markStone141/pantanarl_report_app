<!DOCTYPE html>
<html lang="ja">
<head>
  {% load static %}
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Report App{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'app.css' %}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  {% block content %}{% endblock %}
  <script>
    (function () {
      const topbars = document.querySelectorAll(".topbar");
      const isMobile = window.matchMedia("(max-width: 768px)").matches;
      topbars.forEach(function (topbar, idx) {
        if (topbar.classList.contains("topbar-nav-always")) return;
        if (topbar.classList.contains("topbar-desktop-expanded") && !isMobile) return;
        const nav = topbar.querySelector("nav");
        if (!nav || nav.classList.contains("menu-collapsible")) return;

        nav.classList.add("menu-collapsible");
        const toggleBtn = document.createElement("button");
        toggleBtn.type = "button";
        toggleBtn.className = "btn-inline topbar-menu-toggle";
        toggleBtn.textContent = "笘ｰ";
        toggleBtn.setAttribute("aria-label", "繝｡繝九Η繝ｼ繧帝幕縺・);
        toggleBtn.setAttribute("aria-expanded", "false");
        toggleBtn.setAttribute("aria-controls", "topbar-menu-" + idx);
        nav.id = "topbar-menu-" + idx;

        toggleBtn.addEventListener("click", function () {
          const isOpen = topbar.classList.toggle("menu-open");
          toggleBtn.setAttribute("aria-expanded", isOpen ? "true" : "false");
          toggleBtn.textContent = isOpen ? "笨・ : "笘ｰ";
          toggleBtn.setAttribute("aria-label", isOpen ? "繝｡繝九Η繝ｼ繧帝哩縺倥ｋ" : "繝｡繝九Η繝ｼ繧帝幕縺・);
        });

        nav.addEventListener("click", function (e) {
          if (e.target && e.target.tagName === "A") {
            topbar.classList.remove("menu-open");
            toggleBtn.setAttribute("aria-expanded", "false");
            toggleBtn.textContent = "笘ｰ";
            toggleBtn.setAttribute("aria-label", "繝｡繝九Η繝ｼ繧帝幕縺・);
          }
        });

        topbar.insertBefore(toggleBtn, nav);
      });
    })();
  </script>
</body>
</html>
