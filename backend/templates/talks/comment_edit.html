{% extends "base.html" %}
{% load static %}

{% block title %}コメント編集 | Talks{% endblock %}

{% block content %}
<div class="container">
  <style>
    .comment-edit-cancel-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 10px;
      background: #5b7280;
      color: #fff !important;
      font-size: 0.92rem;
      font-weight: 700;
      text-decoration: none;
      line-height: 1;
    }
  </style>
  <header class="topbar topbar-desktop-expanded" style="margin-bottom:16px;">
    <div>
      <a href="{% url 'talks_index' %}" aria-label="Talksホームへ" style="display:inline-flex; align-items:center;">
        <img src="{% static 'img/talks_logo.png' %}?v=4" alt="Talks" style="height:44px; width:auto; display:block;">
      </a>
    </div>
    <nav>
      <span style="color:#fff; font-size:0.78rem; white-space:nowrap;">おかえりなさい！{{ talks_member_name }}さん</span>
      <a href="{% url 'talks_logout' %}" class="logout-link">ログアウト</a>
    </nav>
  </header>

  <section class="card">
    <h2 style="margin-bottom:10px;">コメントを編集</h2>
    <form method="post" class="grid" style="gap:10px;">
      {% csrf_token %}
      <div>
        <label for="{{ form.body.id_for_label }}">コメント</label>
        {{ form.body }}
      </div>
      {% if form.non_field_errors %}
        <div class="error-text">{{ form.non_field_errors|join:", " }}</div>
      {% endif %}
      <div class="row" style="justify-content:flex-end; margin-top: 8px;">
        <a href="{% url 'talks_detail' comment.post_id %}" class="comment-edit-cancel-link">キャンセル</a>
        <button type="submit" class="btn-inline">保存する</button>
      </div>
    </form>
  </section>
</div>
{% endblock %}
