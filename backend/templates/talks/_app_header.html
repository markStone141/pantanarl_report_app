{% load static %}
<header id="talks-topbar" class="topbar topbar-desktop-expanded topbar-nav-always talks-drawer-topbar talks-topbar-spaced">
  <div>
    <a href="{% url 'talks_index' %}" aria-label="お知らせホームへ" class="talks-home-link">
      <img src="{% static 'img/notice_logo.svg' %}?v=1" alt="お知らせ" class="talks-logo">
    </a>
  </div>
  <button id="talks-drawer-toggle" type="button" class="btn-inline talks-drawer-toggle" aria-label="Open menu" aria-expanded="false">
    <i class="fa-solid fa-bars" aria-hidden="true"></i>
  </button>
  <nav id="talks-drawer-nav" class="talks-drawer-nav">
    <div class="talks-drawer-greeting">{{ talks_member_name }}さん、お疲れ様です</div>
    <span class="talks-drawer-welcome">おかえりなさい！{{ talks_member_name }}さん</span>
    {% if talks_is_admin %}
    <a href="{% url 'performance_index' %}" class="btn-inline talks-nav-link">実績管理</a>
    {% else %}
    <a href="{% url 'performance_member_dashboard' %}" class="btn-inline talks-nav-link">実績管理</a>
    {% endif %}
    <a href="{% url 'dairymetrics_entry_v2_transaction_demo' %}" class="btn-inline talks-nav-link">決済入力</a>
    <a href="{% url 'testimony_article_list' %}" class="btn-inline talks-nav-link">証を見る</a>
    {% if talks_is_admin %}
    <a href="{% url 'dashboard_index' %}" class="btn-inline talks-nav-link">総合管理者ページ</a>
    <a href="{% url 'talks_tag_manage' %}" class="btn-inline talks-nav-link">タグ管理</a>
    <a href="{% url 'talks_deleted_posts_manage' %}" class="btn-inline talks-nav-link">削除トーク</a>
    {% endif %}
    <a href="{% url 'talks_logout' %}" class="logout-link talks-drawer-logout">ログアウト</a>
  </nav>
</header>
<div id="talks-drawer-backdrop" class="talks-drawer-backdrop" hidden></div>
