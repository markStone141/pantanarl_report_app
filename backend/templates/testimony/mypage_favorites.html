{% extends "base.html" %}
{% block title %}My Favorites{% endblock %}
{% block content %}
<div class="container">
  <header class="topbar topbar-nav-always">
    <h1>お気に入り</h1>
    <nav><a class="btn-inline" href="{% url 'testimony_article_list' %}">記事一覧</a></nav>
  </header>
  <article class="card" style="margin-top:16px;">
    {% for row in favorites %}
      <div style="padding:8px 0; border-bottom:1px solid #e2ebef;">
        <a href="{% url 'testimony_article_detail' row.article_id %}">{{ row.article.title }}</a>
        <div style="font-size:12px; color:#557;">登録: {{ row.created_at|date:"Y-m-d H:i" }}</div>
      </div>
    {% empty %}
      <p>お気に入りはありません。</p>
    {% endfor %}
  </article>
</div>
{% endblock %}
