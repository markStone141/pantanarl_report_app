<script>
  (function () {
    const forms = Array.from(document.querySelectorAll("[data-testimony-filter-form]"));
    const openBtn = document.getElementById("testimony-open-filter");
    const closeBtn = document.getElementById("testimony-close-filter");
    const overlay = document.getElementById("testimony-filter-overlay");
    let timer = null;
    let activeController = null;

    function setOpen(isOpen) {
      if (!overlay) return;
      overlay.classList.toggle("open", isOpen);
      overlay.setAttribute("aria-hidden", isOpen ? "false" : "true");
    }

    function primaryForm() {
      return forms.find(function (form) {
        return form.offsetParent !== null;
      }) || forms[0];
    }

    function syncForms(sourceForm) {
      const sourceData = new FormData(sourceForm);
      forms.forEach(function (form) {
        if (form === sourceForm) return;
        Array.from(form.elements).forEach(function (field) {
          if (!field.name || !sourceData.has(field.name)) return;
          field.value = sourceData.get(field.name);
        });
      });
    }

    function buildUrl(form, pageUrl) {
      const baseUrl = pageUrl || form.dataset.resultsUrl || window.location.pathname;
      const url = new URL(baseUrl, window.location.origin);
      const page = url.searchParams.get("page");
      const params = new URLSearchParams(new FormData(form));
      if (page) {
        params.set("page", page);
      }
      url.search = params.toString();
      return url;
    }

    async function fetchResults(form, options) {
      const pageUrl = options && options.pageUrl;
      const shouldPushState = !options || options.pushState !== false;
      syncForms(form);
      const url = buildUrl(form, pageUrl);
      if (activeController) activeController.abort();
      activeController = new AbortController();
      try {
        const response = await fetch(url.toString(), {
          headers: { "X-Requested-With": "XMLHttpRequest" },
          signal: activeController.signal,
        });
        if (!response.ok) return;
        const payload = await response.json();
        const currentResults = document.querySelector("[data-testimony-results]");
        if (currentResults && payload.html) {
          currentResults.outerHTML = payload.html;
        }
        if (shouldPushState) {
          window.history.replaceState({}, "", url.pathname + url.search);
        }
      } catch (error) {
        if (error.name !== "AbortError") {
          console.error(error);
        }
      }
    }

    forms.forEach(function (form) {
      form.addEventListener("submit", function (event) {
        event.preventDefault();
        fetchResults(form);
      });
      form.addEventListener("input", function (event) {
        if (!event.target.matches("[data-testimony-autofill]")) return;
        window.clearTimeout(timer);
        timer = window.setTimeout(function () {
          fetchResults(form);
        }, 250);
      });
      form.addEventListener("change", function () {
        fetchResults(form);
      });
    });

    document.addEventListener("click", function (event) {
      const link = event.target.closest("[data-testimony-page-link]");
      if (!link) return;
      event.preventDefault();
      fetchResults(primaryForm(), { pageUrl: link.href });
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    openBtn?.addEventListener("click", function () { setOpen(true); });
    closeBtn?.addEventListener("click", function () { setOpen(false); });
    overlay?.addEventListener("click", function (event) {
      if (event.target === overlay) setOpen(false);
    });
    window.addEventListener("pageshow", function (event) {
      if (event.persisted) {
        fetchResults(primaryForm(), { pushState: false });
      }
    });
  })();
</script>
