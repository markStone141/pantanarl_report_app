{% extends "testimony/base.html" %}

{% block testimony_title %}商材入力{% endblock %}

{% block testimony_content %}
<article class="card testimony-section">
  <h2>{% if object %}商材を編集{% else %}商材を追加{% endif %}</h2>
  <form method="post" class="stack">{% csrf_token %}
    {{ form.as_p }}
    <div class="testimony-form-actions">
      <button type="submit"><i class="fa-solid fa-floppy-disk" aria-hidden="true"></i> 保存</button>
      <a class="btn-inline" href="{% url 'testimony_product_list' %}">
        <i class="fa-solid fa-ban" aria-hidden="true"></i> キャンセル
      </a>
    </div>
  </form>
</article>
{% endblock %}
