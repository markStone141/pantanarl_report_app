{% if entry_form %}
<form method="post" action="{% url 'dairymetrics_entry' %}?department={{ selected_department.code }}" class="grid dairymetrics-entry-grid" id="dairymetrics-modal-form">
  {% csrf_token %}
  {% include "dairymetrics/partials/entry_form_fields.html" with form=entry_form %}
  <div class="dairymetrics-field-full dairymetrics-form-actions">
    <button type="submit" name="submit_action" value="save" class="btn-inline dairymetrics-save-btn">保存する</button>
    <button type="submit" name="submit_action" value="close_activity" class="btn-inline dairymetrics-close-activity-btn">活動終了</button>
  </div>
</form>
{% endif %}
