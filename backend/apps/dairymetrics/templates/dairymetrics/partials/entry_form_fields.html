{% for field in form %}
<div class="dairymetrics-field {% if field.name == 'memo' %}dairymetrics-field-full{% endif %}">
  <label for="{{ field.id_for_label }}">{{ field.label }}</label>
  {{ field }}
  {% if field.errors %}<div class="error-text">{{ field.errors|join:', ' }}</div>{% endif %}
</div>
{% endfor %}
