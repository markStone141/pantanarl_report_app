name: Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: reportapp-488507
  REGION: asia-northeast1
  SERVICE: report-app
  REPOSITORY: report-app
  IMAGE: asia-northeast1-docker.pkg.dev/reportapp-488507/report-app/report-app:${{ github.sha }}
  MIGRATE_JOB: report-app-migrate
  MIGRATE_JOB_ENV_VARS: DJANGO_SETTINGS_MODULE=config.settings.prod
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-cloud-run-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build container image
        working-directory: backend
        run: |
          docker build -t "${IMAGE}" .

      - name: Push container image
        run: docker push "${IMAGE}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --image="${IMAGE}"

      - name: Upsert migration job
        env:
          JOB_SECRETS: ${{ vars.CLOUD_RUN_MIGRATE_JOB_SECRETS }}
          JOB_ENV_VARS: ${{ vars.CLOUD_RUN_MIGRATE_JOB_ENV_VARS }}
        run: |
          chmod +x backend/scripts/cloud_run_migrate_job.sh
          PROJECT_ID="${PROJECT_ID}" \
          REGION="${REGION}" \
          REPOSITORY="${REPOSITORY}" \
          SERVICE="${SERVICE}" \
          JOB_NAME="${MIGRATE_JOB}" \
          IMAGE="${IMAGE}" \
          ENV_VARS="${JOB_ENV_VARS:-${MIGRATE_JOB_ENV_VARS}}" \
          SECRETS="${JOB_SECRETS}" \
          ./backend/scripts/cloud_run_migrate_job.sh upsert

      - name: Run migration job
        run: |
          PROJECT_ID="${PROJECT_ID}" \
          REGION="${REGION}" \
          SERVICE="${SERVICE}" \
          JOB_NAME="${MIGRATE_JOB}" \
          ./backend/scripts/cloud_run_migrate_job.sh run
